name: Publish to Maven Central

# Publishes the library whenever you push a version tag like `v0.1.1`.
# Nothing is published on normal commits — only on tags matching `v*`.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify tag matches VERSION_NAME
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)"
          echo "Tag version:    $TAG"
          echo "gradle.properties VERSION_NAME: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag ($TAG) does not match VERSION_NAME ($VERSION). Bump gradle.properties and re-tag."
            exit 1
          fi

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
